<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d2a"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </linearGradient>
    <linearGradient id="blade2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3c3c"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="238" fill="none" stroke="#ff3c3c" stroke-width="0.8" opacity="0.2"/>

  <!-- Corner decorative marks - Japanese style -->
  <line x1="80" y1="80" x2="110" y2="80" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="80" x2="80" y2="110" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="432" y1="80" x2="402" y2="80" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="432" y1="80" x2="432" y2="110" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="432" x2="110" y2="432" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="432" x2="80" y2="402" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="432" y1="432" x2="402" y2="432" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="432" y1="432" x2="432" y2="402" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>

  <!-- KATANA 1 — diagonal top-left to bottom-right -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Blade -->
    <polygon points="95,95 108,82 390,350 380,368" fill="url(#blade1)"/>
    <!-- Edge line -->
    <line x1="95" y1="95" x2="388" y2="358" stroke="white" stroke-width="1" opacity="0.8"/>
    <!-- Guard (tsuba) -->
    <ellipse cx="155" cy="155" rx="18" ry="8" fill="#ffd700" transform="rotate(45 155 155)" opacity="0.9"/>
    <!-- Handle (tsuka) -->
    <rect x="82" y="140" width="10" height="52" fill="#8B6914" transform="rotate(45 87 166)" rx="3"/>
    <line x1="75" y1="148" x2="100" y2="173" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
    <line x1="80" y1="153" x2="95" y2="168" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    <!-- Tip shine -->
    <line x1="370" y1="350" x2="390" y2="365" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- KATANA 2 — diagonal top-right to bottom-left (mirrored) -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Blade -->
    <polygon points="417,95 404,82 122,350 132,368" fill="url(#blade2)"/>
    <!-- Edge line -->
    <line x1="417" y1="95" x2="124" y2="358" stroke="white" stroke-width="1" opacity="0.8"/>
    <!-- Guard (tsuba) -->
    <ellipse cx="357" cy="155" rx="18" ry="8" fill="#ffd700" transform="rotate(-45 357 155)" opacity="0.9"/>
    <!-- Handle (tsuka) -->
    <rect x="420" y="140" width="10" height="52" fill="#8B6914" transform="rotate(-45 425 166)" rx="3"/>
    <line x1="437" y1="148" x2="412" y2="173" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
    <line x1="432" y1="153" x2="417" y2="168" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    <!-- Tip shine -->
    <line x1="142" y1="350" x2="122" y2="365" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Center glow point where blades cross -->
  <circle cx="256" cy="224" r="12" fill="#00e5ff" opacity="0.15"/>
  <circle cx="256" cy="224" r="5" fill="white" opacity="0.6" filter="url(#glow)"/>

  <!-- V3 TEXT -->
  <text x="256" y="410"
    font-family="Georgia, serif"
    font-size="110"
    font-weight="bold"
    text-anchor="middle"
    fill="url(#textgrad)"
    filter="url(#glow2)"
    letter-spacing="-4">V3</text>

  <!-- Japanese character 武 (warrior) - small, subtle -->
  <text x="256" y="468"
    font-family="serif"
    font-size="28"
    text-anchor="middle"
    fill="#00e5ff"
    opacity="0.6"
    letter-spacing="2">武　訓練</text>
</svg>
